name: cr — Chromium C API Build Dispatcher

on:
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium release tag'
        required: false
        default: '136.0.7103.114'
      skip_fetch:
        description: 'Skip source fetch if already cached'
        required: false
        default: 'false'
        type: boolean
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'patches/**'
      - 'gn_args/**'
      - '.github/workflows/**'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CR_VERSION: ${{ github.event.inputs.chromium_version || '136.0.7103.114' }}

# ─────────────────────────────────────────────────────────────────────────────
# Cache-aware design
#
#  Job 1 — depot_tools     cached by key "depot-tools-v2"
#  Job 2 — Chromium source  cached by "chromium-src-<ver>-v1"
#  Job 3 — GN build dir     cached by hash(gn_args+src+patches)
#  Job 4 — ccache           cached across runs
#
#  Disk cleanup (free_disk.sh) and apt installs are skipped when the relevant
#  cache is hot — a full cached run costs almost nothing.
#
# Platform roadmap
#  [ACTIVE]   linux-x64   — ubuntu-latest, native .so   ← testing now
#  [PENDING]  windows-x64 — cross-compiled .dll from Linux (clang-cl / lld-link)
#  [PENDING]  macos-arm64 — macos-14 (M1), native .dylib
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1: depot_tools ────────────────────────────────────────────────────────
  depot-tools:
    name: "1 · depot_tools"
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Cache depot_tools
        id: cache
        uses: actions/cache@v4
        with:
          path: depot_tools
          key: depot-tools-v2

      # Only fetch + free disk when the cache is cold
      - name: Free disk space
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf \
            /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/lib/jvm /usr/share/swift \
            /opt/hostedtoolcache/CodeQL /usr/local/go /usr/lib/llvm-* \
            /opt/hostedtoolcache/Ruby /opt/hostedtoolcache/node \
            /opt/hostedtoolcache/PyPy
          sudo docker system prune -af 2>/dev/null || true
          df -h /

      - name: Fetch depot_tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - uses: actions/upload-artifact@v4
        with:
          name: depot-tools
          path: depot_tools
          retention-days: 1

  # ── 2: Fetch & prune Chromium source ──────────────────────────────────────
  fetch-source:
    name: "2 · Fetch source"
    needs: depot-tools
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.src-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - name: Restore source cache
        id: src-cache
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-src-${{ env.CR_VERSION }}-v1
          restore-keys: chromium-src-${{ env.CR_VERSION }}-

      # Only need depot_tools + heavy disk ops on a cache miss
      - name: Free disk space
        if: steps.src-cache.outputs.cache-hit != 'true'
        run: bash scripts/free_disk.sh

      - uses: actions/download-artifact@v4
        if: steps.src-cache.outputs.cache-hit != 'true'
        with:
          name: depot-tools
          path: depot_tools

      - name: Mark depot_tools executable
        if: steps.src-cache.outputs.cache-hit != 'true'
        run: chmod -R +x depot_tools/

      - name: Fetch Chromium source
        if: >
          steps.src-cache.outputs.cache-hit != 'true' &&
          github.event.inputs.skip_fetch != 'true'
        run: |
          export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
          bash scripts/fetch_chromium.sh \
            "$CR_VERSION" \
            "$GITHUB_WORKSPACE/depot_tools" \
            "$GITHUB_WORKSPACE/chromium"

      - name: Prune unneeded source directories
        if: steps.src-cache.outputs.cache-hit != 'true'
        run: bash scripts/prune_source.sh "$GITHUB_WORKSPACE/chromium/src"

      - name: Disk usage
        run: df -h /

  # ── 3: Patch & configure (Linux x64) ──────────────────────────────────────
  configure:
    name: "3 · Patch & configure (linux-x64)"
    needs: fetch-source
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.build-cache.outputs.cache-hit }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache build dir
        id: build-cache
        uses: actions/cache@v4
        with:
          path: chromium/src/out/Linux
          key: >-
            chromium-linux-${{ env.CR_VERSION }}-
            ${{ hashFiles('gn_args/**','src/**','patches/**') }}-v1

      # Everything below is skipped when the GN build dir is cached
      - name: Free disk space
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: bash scripts/free_disk.sh

      - uses: actions/download-artifact@v4
        if: steps.build-cache.outputs.cache-hit != 'true'
        with: { name: depot-tools, path: depot_tools }

      - name: Mark depot_tools executable
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: chmod -R +x depot_tools/

      - name: Restore source cache
        if: steps.build-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-src-${{ env.CR_VERSION }}-v1

      - name: Install build dependencies
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          # No system clang/lld — gclient runhooks downloads Chromium's own
          # bundled clang toolchain into third_party/llvm-build/
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build python3 python3-pip \
            pkg-config curl \
            libglib2.0-dev libgtk-3-dev \
            libdrm-dev libgbm-dev \
            libxkbcommon-dev \
            libnss3-dev libdbus-1-dev \
            libatk1.0-dev libatk-bridge2.0-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Apply patches
        if: steps.build-cache.outputs.cache-hit != 'true'
        env:
          UNGOOGLED_VERSION: '${{ env.CR_VERSION }}-1'
        run: bash scripts/apply_patches.sh "$GITHUB_WORKSPACE/chromium/src"

      - name: Configure GN (linux-x64)
        if: steps.build-cache.outputs.cache-hit != 'true'
        env:
          CR_TARGET_OS: linux
          CR_OUT_DIR: Linux
        run: |
          export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
          bash scripts/setup_build.sh \
            "$GITHUB_WORKSPACE/chromium/src" \
            "$GITHUB_WORKSPACE/depot_tools"

      - name: Show GN args
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          GN="chromium/src/buildtools/linux64/gn"
          [ -x "$GN" ] || GN="gn"
          "$GN" args chromium/src/out/Linux --list --short 2>/dev/null | head -50 || true

  # ── 4: Compile ─────────────────────────────────────────────────────────────
  compile:
    name: "4 · Compile cr_api (linux-x64)"
    needs: configure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Compile always needs the source + build dir, but disk cleanup only
      # helps if we're doing a heavy compile (ccache miss).
      - name: Restore source cache
        id: src-cache
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-src-${{ env.CR_VERSION }}-v1

      - name: Restore build dir cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: chromium/src/out/Linux
          key: >-
            chromium-linux-${{ env.CR_VERSION }}-
            ${{ hashFiles('gn_args/**','src/**','patches/**') }}-v1

      - name: Free disk space
        if: steps.src-cache.outputs.cache-hit != 'true' || steps.build-cache.outputs.cache-hit != 'true'
        run: bash scripts/free_disk.sh

      - uses: actions/download-artifact@v4
        with: { name: depot-tools, path: depot_tools }
      - run: chmod -R +x depot_tools/

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential ninja-build python3 \
            pkg-config \
            libglib2.0-dev libgtk-3-dev \
            libdrm-dev libgbm-dev \
            libxkbcommon-dev \
            libnss3-dev libdbus-1-dev \
            libatk1.0-dev libatk-bridge2.0-dev \
            libpango1.0-dev \
            libcairo2-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 4G
          key: ccache-linux-${{ env.CR_VERSION }}
          restore-keys: ccache-linux-

      - name: Compile cr_api
        env:
          CCACHE_DIR: /home/runner/.ccache
        run: |
          export PATH="$GITHUB_WORKSPACE/depot_tools:$PATH"
          cd chromium/src

          # Use Chromium's own clang (downloaded by gclient runhooks)
          CLANG="third_party/llvm-build/Release+Asserts/bin/clang"
          if [ -x "$CLANG" ]; then
            export CC="ccache $PWD/$CLANG"
            export CXX="ccache $PWD/${CLANG}++"
          else
            export CC="ccache clang"
            export CXX="ccache clang++"
          fi

          NINJA="../../depot_tools/ninja"
          [ -x "$NINJA" ] || NINJA="ninja"

          "$NINJA" -C out/Linux -j2 -l2 //cr_api/src:cr_api

          echo "=== Artifacts ==="
          ls -lh out/Linux/libcr_api* 2>/dev/null || \
            find out/Linux -maxdepth 1 \( -name 'libcr_api*' -o -name 'cr_api.*' \) \
            | head -10
          df -h /

      - name: Package
        run: |
          mkdir -p dist/include dist/lib
          cp include/cr_browser.h dist/include/
          cp include/cr_types.h   dist/include/
          find chromium/src/out/Linux -maxdepth 1 \
            \( -name 'libcr_api.so' -o -name 'libcr_api.a' \) \
            -exec cp {} dist/lib/ \;
          ARCHIVE="cr-$CR_VERSION-linux-x64.tar.gz"
          tar -czf "$ARCHIVE" dist/
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          tar -tvf "$ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cr-linux-x64-${{ env.CR_VERSION }}
          path: |
            cr-${{ env.CR_VERSION }}-linux-x64.tar.gz
            cr-${{ env.CR_VERSION }}-linux-x64.tar.gz.sha256
          retention-days: 30

      - name: Build summary
        run: |
          {
            echo "## cr $CR_VERSION — linux-x64"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Chromium | \`$CR_VERSION\` |"
            echo "| Platform | linux-x64 |"
            echo "| Build type | headless, component, ozone, no-symbols |"
            ARTIFACT_SIZE=$(du -sh dist/lib/ 2>/dev/null | cut -f1 || echo "?")
            echo "| Library size | $ARTIFACT_SIZE |"
            echo ""
            echo "_release.yml will tag and publish a GitHub Release automatically._"
          } >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# PENDING platforms — uncomment once Linux build is confirmed working
# ─────────────────────────────────────────────────────────────────────────────
#
#  windows-x64: cross-compiled from ubuntu-latest via clang-cl + lld-link
#    GN: target_os="win" target_cpu="x64"
#    Extra: python3 build/vs_toolchain.py update --force
#
#  macos-arm64: native build on macos-14 (M1 — 3-core, 7 GB RAM)
#    GN: target_os="mac" target_cpu="arm64"
#    Note: 10× minute cost; source cache is per-OS so first run fetches fresh

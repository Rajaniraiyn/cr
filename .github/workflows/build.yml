name: cr — Chromium C API Build Dispatcher

# ── Triggers ────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      chromium_version:
        description: 'Chromium release tag (e.g. 124.0.6367.155)'
        required: false
        default: '124.0.6367.155'
      skip_fetch:
        description: 'Skip source fetch if cached (true/false)'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'include/**'
      - 'patches/**'
      - 'gn_args/**'
      - '.github/workflows/**'

# Only one build at a time; cancel outdated queued runs.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CR_VERSION: ${{ github.event.inputs.chromium_version || '124.0.6367.155' }}
  DEPOT_TOOLS_UPDATE: '0'
  PYTHONDONTWRITEBYTECODE: '1'
  # Chromium's own clang (fetched by hooks) — keep consistent
  LLVM_DOWNLOAD_GOLD_PLUGIN: '0'

# ── Job 1: depot_tools ──────────────────────────────────────────────────────
jobs:
  depot-tools:
    name: "1 · depot_tools"
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache.outputs.cache-hit }}
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/lib/jvm /usr/share/swift \
            /opt/hostedtoolcache/CodeQL /usr/local/go /usr/lib/llvm-*
          sudo docker system prune -af 2>/dev/null || true
          df -h /

      - name: Cache depot_tools
        id: cache
        uses: actions/cache@v4
        with:
          path: depot_tools
          key: depot-tools-v1

      - name: Fetch depot_tools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://chromium.googlesource.com/chromium/tools/depot_tools.git

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: depot-tools
          path: depot_tools
          retention-days: 1

  # ── Job 2: Fetch & prune source ──────────────────────────────────────────
  fetch-source:
    name: "2 · Fetch Chromium source"
    needs: depot-tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: bash scripts/free_disk.sh

      - name: Download depot_tools artifact
        uses: actions/download-artifact@v4
        with:
          name: depot-tools
          path: depot_tools

      - name: Mark depot_tools executable
        run: chmod -R +x depot_tools/

      # Cache the entire chromium/src keyed by version.
      # If the cache exists the fetch step is skipped — saves ~30 min.
      - name: Restore source cache
        id: src-cache
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-src-${{ env.CR_VERSION }}-v1
          restore-keys: chromium-src-${{ env.CR_VERSION }}-

      - name: Fetch Chromium source
        if: >
          steps.src-cache.outputs.cache-hit != 'true' &&
          github.event.inputs.skip_fetch != 'true'
        env:
          PATH: ${{ github.workspace }}/depot_tools:${{ env.PATH }}
        run: |
          bash scripts/fetch_chromium.sh \
            "$CR_VERSION" \
            "$GITHUB_WORKSPACE/depot_tools" \
            "$GITHUB_WORKSPACE/chromium"

      - name: Prune unneeded source directories
        if: steps.src-cache.outputs.cache-hit != 'true'
        run: bash scripts/prune_source.sh "$GITHUB_WORKSPACE/chromium/src"

      - name: Disk usage after fetch+prune
        run: df -h /

  # ── Job 3: Apply patches + configure GN ──────────────────────────────────
  configure:
    name: "3 · Patch & configure"
    needs: fetch-source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: bash scripts/free_disk.sh

      - name: Download depot_tools artifact
        uses: actions/download-artifact@v4
        with:
          name: depot-tools
          path: depot_tools

      - name: Mark depot_tools executable
        run: chmod -R +x depot_tools/

      - name: Restore source cache
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-src-${{ env.CR_VERSION }}-v1

      - name: Cache configured build dir
        id: build-cache
        uses: actions/cache@v4
        with:
          path: chromium/src/out/Minimal
          key: >-
            chromium-build-${{ env.CR_VERSION }}-
            ${{ hashFiles('gn_args/**','src/**','patches/**') }}-v1

      - name: Install build dependencies
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang lld ninja-build python3 python3-pip \
            libglib2.0-dev libgtk-3-dev libx11-dev libxcomposite-dev \
            libxdamage-dev libxrandr-dev libxss-dev libxtst-dev \
            libpci-dev libnss3-dev libdbus-1-dev libatk1.0-dev \
            libatk-bridge2.0-dev libcups2-dev libdrm-dev libgbm-dev \
            libxkbcommon-dev libasound2-dev libpulse-dev

      - name: Apply patches
        if: steps.build-cache.outputs.cache-hit != 'true'
        env:
          UNGOOGLED_VERSION: '${{ env.CR_VERSION }}-1'
        run: bash scripts/apply_patches.sh "$GITHUB_WORKSPACE/chromium/src"

      - name: Configure GN
        if: steps.build-cache.outputs.cache-hit != 'true'
        env:
          PATH: ${{ github.workspace }}/depot_tools:${{ env.PATH }}
        run: |
          bash scripts/setup_build.sh \
            "$GITHUB_WORKSPACE/chromium/src" \
            "$GITHUB_WORKSPACE/depot_tools"

  # ── Job 4: Compile ────────────────────────────────────────────────────────
  compile:
    name: "4 · Compile cr_api"
    needs: configure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: bash scripts/free_disk.sh

      - name: Download depot_tools artifact
        uses: actions/download-artifact@v4
        with:
          name: depot-tools
          path: depot_tools

      - name: Mark depot_tools executable
        run: chmod -R +x depot_tools/

      - name: Restore source cache
        uses: actions/cache@v4
        with:
          path: chromium
          key: chromium-src-${{ env.CR_VERSION }}-v1

      - name: Restore build dir cache
        uses: actions/cache@v4
        with:
          path: chromium/src/out/Minimal
          key: >-
            chromium-build-${{ env.CR_VERSION }}-
            ${{ hashFiles('gn_args/**','src/**','patches/**') }}-v1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential clang lld ninja-build python3 \
            libglib2.0-dev libgtk-3-dev libx11-dev libxcomposite-dev \
            libxdamage-dev libxrandr-dev libxss-dev libxtst-dev \
            libpci-dev libnss3-dev libdbus-1-dev libatk1.0-dev \
            libatk-bridge2.0-dev libcups2-dev libdrm-dev libgbm-dev \
            libxkbcommon-dev libasound2-dev libpulse-dev

      # ccache dramatically speeds up repeated builds (cache hit = ~20 min).
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          max-size: 4G
          key: ccache-cr-${{ env.CR_VERSION }}
          restore-keys: ccache-cr-

      - name: Compile (ninja -j2)
        env:
          PATH: ${{ github.workspace }}/depot_tools:${{ env.PATH }}
          CCACHE_DIR: /home/runner/.ccache
        run: |
          cd chromium/src

          # Inject ccache wrapper if available
          if command -v ccache &>/dev/null; then
            export CC="ccache clang"
            export CXX="ccache clang++"
          fi

          # -j2 respects the 2-core free runner; -l2 caps load average
          ninja -C out/Minimal -j2 -l2 //cr_api/src:cr_api

          echo "=== Build artifacts ==="
          ls -lh out/Minimal/libcr_api* 2>/dev/null || \
          ls -lh out/Minimal/*.so 2>/dev/null || true

          df -h /

      - name: Package distribution
        run: |
          mkdir -p dist/include dist/lib

          cp include/cr_browser.h dist/include/
          cp include/cr_types.h   dist/include/

          # Collect built artifacts (component build produces many .so files;
          # libcr_api.so is the only one consumers need to link against).
          find chromium/src/out/Minimal -maxdepth 1 \
            \( -name 'libcr_api.so' -o -name 'libcr_api.a' \) \
            -exec cp {} dist/lib/ \;

          # Also bundle the headless shell runner for testing
          [ -f chromium/src/out/Minimal/headless_shell ] && \
            cp chromium/src/out/Minimal/headless_shell dist/ || true

          tar -czf "cr-$CR_VERSION-linux-x64.tar.gz" dist/
          sha256sum "cr-$CR_VERSION-linux-x64.tar.gz" > "cr-$CR_VERSION-linux-x64.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cr-linux-x64-${{ env.CR_VERSION }}
          path: |
            cr-${{ env.CR_VERSION }}-linux-x64.tar.gz
            cr-${{ env.CR_VERSION }}-linux-x64.tar.gz.sha256
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cr-${{ env.CR_VERSION }}-linux-x64.tar.gz
            cr-${{ env.CR_VERSION }}-linux-x64.tar.gz.sha256
          body: |
            ## cr ${{ env.CR_VERSION }}

            Minimal Chromium C API library — headless-only, de-Googled via
            ungoogled-chromium patches, compiled for Linux x64.

            ### Linking
            ```
            gcc -o myapp myapp.c -L./lib -lcr_api -Wl,-rpath,'$ORIGIN/lib'
            ```

            ### API surface (v0.1)
            See `include/cr_browser.h` for the full C API.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
